name: Fetch and Save Data

on:
  schedule:
    - cron: '0 8 * * 1-5' # Every weekday at 8am
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  fetch_data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ./docs
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547  # v1
        with:
          app-id: ${{ secrets.PROBE_APP_ID }}
          private-key: ${{ secrets.PROBE_APP_PRIVATE_KEY }}
          owner: TykTechnologies

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fetch and save data
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: node fetchAndSaveData.js

      - name: Check for failed jobs
        id: check_failed_jobs
        run: |
          if grep -q '"conclusion": "failure"' data.json; then
            echo "failed_jobs=true" >> $GITHUB_ENV
            # Count failed jobs
            FAILED_COUNT=$(jq '[.data[].jobs[] | select(.conclusion == "failure")] | length' data.json)
            echo "FAILED_COUNT=$FAILED_COUNT" >> $GITHUB_ENV

            # Create a file with the failed jobs list for the Slack message
            echo "*Failed Jobs:*\n" > failed_jobs.txt
            jq -r '.data[].jobs[] | select(.conclusion == "failure") | "• <\(.url)|\(.repo_name)/\(.head_branch): \(.name | .[0:60])> — Job \(.id) (\(.duration/1000 | floor)s)"' data.json >> failed_jobs.txt

            # Create a separate file with just the repository and job ID information for OEL
            echo "Failed Jobs Summary:\n" > failed_jobs_summary.txt
            jq -r '.data[].jobs[] | select(.conclusion == "failure") | "• Repository: \(.repo_name), Job ID: \(.id)"' data.json >> failed_jobs_summary.txt
            FAILED_JOBS_SUMMARY=$(cat failed_jobs_summary.txt | tr '\n' ' ' | sed 's/  / \\n /g')
            echo "failed_jobs_summary=$FAILED_JOBS_SUMMARY" >> $GITHUB_ENV
          else
            echo "failed_jobs=false" >> $GITHUB_ENV
          fi

      - name: Prepare Slack message
        if: ${{ env.failed_jobs == 'true' }}
        id: slack-message
        run: |
          # Escape special characters for JSON
          FAILED_JOBS=$(cat failed_jobs.txt | sed 's/"/\\"/g' | tr '\n' ' ' | sed 's/  / \\n /g')
          echo "message=$FAILED_JOBS" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Update data.json [skip ci]" || exit 0
          git push

      - name: Notify slack
        if: ${{ env.failed_jobs == 'true' }}
        uses: slackapi/slack-github-action@37ebaef184d7626c5f204ab8d3baff4262dd30f0  # v1.27.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":robot_face: <@${{ env.OEL_SLACK_ID }}> Investigate test pipelines.\n\n${{ env.failed_jobs_summary }}\n\nUse this information to identify specific jobs and repositories. Follow the instructions from Oel/docs/github-actions-debugging.md"
                  }
                },
                {
                  "type": "divider"
                },
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "⚠️ Pipeline failures detected",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*There are ${{ env.FAILED_COUNT }} failing pipeline jobs!*\nPlease check the pipelines: <https://tyktechnologies.github.io/qa-automation-utils/|qa-automation-utils>"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ steps.slack-message.outputs.message }}"
                  }
                },
                {
                  "type": "divider"
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
          OEL_SLACK_ID: U09T5KRLMPU
          ILIJA_SLACK_ID: U3PA24R0Q
          LAURENTIU_SLACK_ID: U3QNEPT6K
          BURAK_SLACK_ID: U02P6G92FDJ
          LEO_SLACK_ID: U3P2L4XNE
